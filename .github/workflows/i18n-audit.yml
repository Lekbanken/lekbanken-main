name: i18n Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  i18n-audit:
    name: i18n Audit (No Regressions)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run i18n audit (CI guard)
        run: node scripts/i18n-audit.mjs --ci

      - name: Write workflow summary
        if: always()
        run: node scripts/i18n-audit-ci-summary.mjs

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: i18n-audit
          path: |
            i18n-audit.md
            i18n-audit.json
