name: RLS Policy Tests

on:
  push:
    branches:
      - main
      - develop
      - 'claude/**'
    paths:
      - 'supabase/migrations/**'
      - 'tests/rls/**'
      - '.github/workflows/rls-tests.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'supabase/migrations/**'
      - 'tests/rls/**'
      - '.github/workflows/rls-tests.yml'
  workflow_dispatch:

concurrency:
  group: rls-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rls-tests:
    name: Run RLS Policy Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.78.1  # Pin to avoid CI flakiness from upstream CLI changes

      - name: Start local database and apply migrations
        run: |
          set -o pipefail
          echo "Starting local database and applying migrations..."
          supabase db start --debug 2>&1 | tee startup_output.log
        continue-on-error: false

      - name: Run RLS policy tests
        id: rls_tests
        run: |
          echo "Running RLS policy test harness..."

          # Get local database URL
          DB_URL=$(supabase status -o env | grep DATABASE_URL | cut -d '=' -f2-)

          # Run test suite
          psql "$DB_URL" -f tests/rls/demo-policies.test.sql > test_output.log 2>&1

          TEST_EXIT_CODE=$?

          # Display output
          cat test_output.log

          # Check for failures
          if grep -q "FAILED" test_output.log; then
            echo "❌ RLS tests FAILED"
            exit 1
          fi

          if [ $TEST_EXIT_CODE -ne 0 ]; then
            echo "❌ RLS tests exited with error code: $TEST_EXIT_CODE"
            exit 1
          fi

          echo "✅ All RLS tests PASSED"
        continue-on-error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rls-test-results
          path: |
            test_output.log
            startup_output.log

      - name: Stop Supabase
        if: always()
        run: supabase stop

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const testOutput = fs.existsSync('test_output.log')
              ? fs.readFileSync('test_output.log', 'utf8')
              : null;
            const startupOutput = fs.existsSync('startup_output.log')
              ? fs.readFileSync('startup_output.log', 'utf8')
              : null;
            const output = testOutput ?? startupOutput ?? 'No startup or test log was captured.';
            const summary = testOutput
              ? 'RLS policy test harness failed.'
              : startupOutput
                ? 'Supabase database startup failed before the RLS SQL harness started.'
                : 'Workflow failed before logs were captured.';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ❌ RLS Policy Tests Failed\n\n${summary}\n\n<details>\n<summary>Captured Output</summary>\n\n\`\`\`\n${output}\n\`\`\`\n\n</details>\n\nPlease review the RLS policies and fix the failing tests before merging.`
            });

  security-check:
    name: Security Check - Demo Policies
    runs-on: ubuntu-latest
    needs: rls-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for current demo security markers
        run: |
          echo "Checking for current demo security markers in migrations..."

          REQUIRED_MARKERS=(
            "CREATE POLICY \"demo_tenant_write_protection\""
            "CREATE POLICY \"demo_tenant_delete_protection\""
            "CREATE POLICY \"demo_content_access\""
            "CREATE OR REPLACE FUNCTION public.enforce_demo_flag_protection()"
            "CREATE TRIGGER enforce_demo_flags"
            "CREATE POLICY \"demo_no_public_sessions\""
          )

          MISSING_MARKERS=()

          for marker in "${REQUIRED_MARKERS[@]}"; do
            if ! grep -Rqs "$marker" supabase/migrations/; then
              MISSING_MARKERS+=("$marker")
            fi
          done

          if [ ${#MISSING_MARKERS[@]} -gt 0 ]; then
            echo "❌ Missing required demo security markers:"
            printf '%s\n' "${MISSING_MARKERS[@]}"
            exit 1
          fi

          echo "✅ All required demo security markers found"

      - name: Verify RLS enabled on critical tables
        run: |
          echo "Verifying RLS enablement on critical tables..."

          REQUIRED_TABLES=(
            "tenants"
            "games"
            "users"
            "participant_sessions"
            "game_sessions"
          )

          MISSING_RLS_TABLES=()

          for table in "${REQUIRED_TABLES[@]}"; do
            if ! grep -RiqE "ALTER TABLE( IF EXISTS)? (public\.)?${table} ENABLE ROW LEVEL SECURITY" supabase/migrations/; then
              MISSING_RLS_TABLES+=("$table")
            fi
          done

          if [ ${#MISSING_RLS_TABLES[@]} -gt 0 ]; then
            echo "❌ Missing explicit RLS enablement for critical tables:"
            printf '%s\n' "${MISSING_RLS_TABLES[@]}"
            exit 1
          fi

          echo "✅ RLS enablement found for all critical tables"

  documentation-check:
    name: Documentation Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for demo documentation
        run: |
          echo "Checking for demo implementation documentation..."

          REQUIRED_DOCS=(
            "docs/demo_current_state.md"
            "docs/demo_technical_spec.md"
            "docs/MASTERPROMPT_DEMO_IMPLEMENTATION.md"
          )

          MISSING_DOCS=()

          for doc in "${REQUIRED_DOCS[@]}"; do
            if [ ! -f "$doc" ]; then
              MISSING_DOCS+=("$doc")
            fi
          done

          if [ ${#MISSING_DOCS[@]} -gt 0 ]; then
            echo "❌ Missing required documentation:"
            printf '%s\n' "${MISSING_DOCS[@]}"
            exit 1
          fi

          echo "✅ All required documentation present"
