name: RLS Policy Tests

on:
  push:
    branches:
      - main
      - develop
      - 'claude/**'
    paths:
      - 'supabase/migrations/**'
      - 'tests/rls/**'
      - '.github/workflows/rls-tests.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'supabase/migrations/**'
      - 'tests/rls/**'
      - '.github/workflows/rls-tests.yml'

concurrency:
  group: rls-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect-scope:
    name: Detect RLS Scope
    runs-on: ubuntu-latest
    outputs:
      db_or_tests: ${{ steps.filter.outputs.db_or_tests }}
      workflow_only: ${{ steps.filter.outputs.workflow && steps.filter.outputs.db_or_tests != 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            db_or_tests:
              - 'supabase/migrations/**'
              - 'tests/rls/**'
            workflow:
              - '.github/workflows/rls-tests.yml'

  workflow-config-only:
    name: Workflow Config Only
    runs-on: ubuntu-latest
    needs: detect-scope
    if: needs.detect-scope.outputs.workflow_only == 'true'

    steps:
      - name: Skip heavy RLS stack
        run: echo "Only .github/workflows/rls-tests.yml changed; skipping Supabase startup and SQL checks."

  rls-tests:
    name: Run RLS Policy Tests
    runs-on: ubuntu-latest
    needs: detect-scope
    if: needs.detect-scope.outputs.db_or_tests == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local database and apply migrations
        run: |
          set -o pipefail
          echo "Starting local database and applying migrations..."
          supabase db start --debug 2>&1 | tee startup_output.log
        continue-on-error: false

      - name: Run RLS policy tests
        id: rls_tests
        run: |
          echo "Running RLS policy test harness..."

          # Get local database URL
          DB_URL=$(supabase status -o env | grep DATABASE_URL | cut -d '=' -f2-)

          # Run test suite
          psql "$DB_URL" -f tests/rls/demo-policies.test.sql > test_output.log 2>&1

          TEST_EXIT_CODE=$?

          # Display output
          cat test_output.log

          # Check for failures
          if grep -q "FAILED" test_output.log; then
            echo "❌ RLS tests FAILED"
            exit 1
          fi

          if [ $TEST_EXIT_CODE -ne 0 ]; then
            echo "❌ RLS tests exited with error code: $TEST_EXIT_CODE"
            exit 1
          fi

          echo "✅ All RLS tests PASSED"
        continue-on-error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rls-test-results
          path: |
            test_output.log
            startup_output.log

      - name: Stop Supabase
        if: always()
        run: supabase stop

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const testOutput = fs.existsSync('test_output.log')
              ? fs.readFileSync('test_output.log', 'utf8')
              : null;
            const startupOutput = fs.existsSync('startup_output.log')
              ? fs.readFileSync('startup_output.log', 'utf8')
              : null;
            const output = testOutput ?? startupOutput ?? 'No startup or test log was captured.';
            const summary = testOutput
              ? 'RLS policy test harness failed.'
              : startupOutput
                ? 'Supabase database startup failed before the RLS SQL harness started.'
                : 'Workflow failed before logs were captured.';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ❌ RLS Policy Tests Failed\n\n${summary}\n\n<details>\n<summary>Captured Output</summary>\n\n\`\`\`\n${output}\n\`\`\`\n\n</details>\n\nPlease review the RLS policies and fix the failing tests before merging.`
            });

  security-check:
    name: Security Check - Demo Policies
    runs-on: ubuntu-latest
    needs:
      - detect-scope
      - rls-tests
    if: needs.detect-scope.outputs.db_or_tests == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for demo policy keywords
        run: |
          echo "Checking for required demo security keywords in migrations..."

          REQUIRED_KEYWORDS=(
            "demo_tenant_write_protection"
            "demo_content_access"
            "demo_user_flag_protection"
            "demo_no_public_sessions"
          )

          MISSING_KEYWORDS=()

          for keyword in "${REQUIRED_KEYWORDS[@]}"; do
            if ! grep -rq "$keyword" supabase/migrations/; then
              MISSING_KEYWORDS+=("$keyword")
            fi
          done

          if [ ${#MISSING_KEYWORDS[@]} -gt 0 ]; then
            echo "❌ Missing required demo security policies:"
            printf '%s\n' "${MISSING_KEYWORDS[@]}"
            exit 1
          fi

          echo "✅ All required demo security policies found"

      - name: Verify RLS enabled on critical tables
        run: |
          echo "Verifying RLS is enabled on critical tables..."

          # Check migrations for RLS enablement
          if ! grep -rq "ALTER TABLE.*ENABLE ROW LEVEL SECURITY" supabase/migrations/ &&
             ! grep -rq "ENABLE ROW LEVEL SECURITY" supabase/migrations/; then
            echo "⚠️  Warning: No explicit RLS enablement found in migrations"
            echo "Ensure RLS is enabled on: tenants, games, users, participant_sessions, game_sessions"
          else
            echo "✅ RLS enablement commands found in migrations"
          fi

  documentation-check:
    name: Documentation Check
    runs-on: ubuntu-latest
    needs: detect-scope
    if: needs.detect-scope.outputs.db_or_tests == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for demo documentation
        run: |
          echo "Checking for demo implementation documentation..."

          REQUIRED_DOCS=(
            "docs/demo_current_state.md"
            "docs/demo_technical_spec.md"
            "docs/MASTERPROMPT_DEMO_IMPLEMENTATION.md"
          )

          MISSING_DOCS=()

          for doc in "${REQUIRED_DOCS[@]}"; do
            if [ ! -f "$doc" ]; then
              MISSING_DOCS+=("$doc")
            fi
          done

          if [ ${#MISSING_DOCS[@]} -gt 0 ]; then
            echo "❌ Missing required documentation:"
            printf '%s\n' "${MISSING_DOCS[@]}"
            exit 1
          fi

          echo "✅ All required documentation present"
