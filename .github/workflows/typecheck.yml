name: TypeScript Type Check (post-merge)

# Post-merge safety net. PR validation is handled by validate.yml.
# This deliberately duplicates tsc + build from the PR gate to catch:
#   - force-merged PRs that bypassed Validate
#   - race conditions between concurrent PR merges
# If CI minutes are a concern, this workflow can be removed — Validate covers the same checks pre-merge.
on:
  push:
    branches: [main, develop]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run TypeScript type check
        run: npm run type-check

      - name: Build check
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: true
