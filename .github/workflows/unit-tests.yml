name: Unit Tests (post-merge)

# Post-merge safety net. PR validation is handled by validate.yml.
"on":
  push:
    branches: [main, develop]

jobs:
  vitest:
    name: Vitest Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npx vitest run --reporter=verbose
